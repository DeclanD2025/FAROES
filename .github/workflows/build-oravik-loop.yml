name: Build Øravík loop route

on:
  workflow_dispatch:
  push:
    branches:
      - codex/oravik-loop-route
    paths:
      - scripts/build_oravik_loop.py
      - scripts/build_oravik_loop_v2.py
      - scripts/build_oravik_loop_v3.py
      - scripts/build_oravik_loop_v4.py
      - scripts/requirements-route.txt
      - .github/workflows/build-oravik-loop.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/build_oravik_loop.py
      - scripts/build_oravik_loop_v2.py
      - scripts/build_oravik_loop_v3.py
      - scripts/build_oravik_loop_v4.py
      - scripts/requirements-route.txt
      - .github/workflows/build-oravik-loop.yml

permissions:
  contents: write

jobs:
  build-route:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'codex/oravik-loop-route' }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-route.txt

      - name: Install route tooling
        run: python -m pip install -r scripts/requirements-route.txt

      - name: Generate and audit route
        shell: bash
        run: |
          mkdir -p route-output
          set -o pipefail
          python scripts/build_oravik_loop_v4.py 2>&1 | tee route-output/build.log

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oravik-loop-route-${{ github.run_number }}
          path: route-output/
          if-no-files-found: error

      - name: Commit generated route files
        if: ${{ success() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add route-output/
          if git diff --cached --quiet; then
            echo "No generated route changes"
          else
            git commit -m "Generate audited Øravík loop route [skip ci]"
            git push origin HEAD:${{ github.head_ref || 'codex/oravik-loop-route' }}
          fi
